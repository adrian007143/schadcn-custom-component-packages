<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <style>
    .bg       { fill: #ffffff; }
    .border   { stroke: rgba(0,0,0,0.12); }
    .checkbox { fill: #4aba5e; }
    .check    { stroke: #ffffff; }
    @media (prefers-color-scheme: dark) {
      .bg       { fill: #1a1a1a; }
      .border   { stroke: rgba(255,255,255,0.5); }
      .checkbox { fill: #ffffff; }
      .check    { stroke: #4aba5e; }
    }
  </style>
  <rect width="64" height="64" rx="15" class="bg"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="14"
    class="border" stroke-width="2" fill="none"/>
  <path d="M27 10 L8 32 L27 54"
    stroke="#4aba5e" stroke-width="10.5"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="33" y="19" width="26" height="26" rx="6" class="checkbox"/>
  <path d="M38.5 32 L43.5 37.5 L53.5 25.5"
    class="check" stroke-width="4"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
